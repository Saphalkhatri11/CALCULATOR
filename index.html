<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALCULATOR</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"  defer></script>
</head>
<body>
    <div id="main-rectangle">
        <div id="history-rectangle"">
            <p  id="historyText">History</p>
            <svg xmlns="http://www.w3.org/2000/svg" height="27px" viewBox="0 -960 960 960" width="27px" fill="#000000F" class="Arrow"><path d="M400-240 160-480l240-240 56 58-142 142h486v80H314l142 142-56 58Z" /></svg>
            <div class="Divequation">
                <p class="equation">2 + 2</p>
                <p class="answer">4.1111</p>

            </div>
        </div>

        <svg xmlns="http://www.w3.org/2000/svg" height="30px" viewBox="0 -960 960 960" width="30px" fill="#FFFFFF" id="history"><path d="M480-120q-138 0-240.5-91.5T122-440h82q14 104 92.5 172T480-200q117 0 198.5-81.5T760-480q0-117-81.5-198.5T480-760q-69 0-129 32t-101 88h110v80H120v-240h80v94q51-64 124.5-99T480-840q75 0 140.5 28.5t114 77q48.5 48.5 77 114T840-480q0 75-28.5 140.5t-77 114q-48.5 48.5-114 77T480-120Zm112-192L440-464v-216h80v184l128 128-56 56Z"/></svg>
        
        <p id="show">00</p>
        <div id="second-rectangle">
            <div class="rectangle blue" id="clear">
                <p data-id="001">AC</p>
            </div>
            <div class="rectangle blue" id="percentage" data-id="%">
                <p data-id="%" id="modulo">%</p>
            </div>
            <div class="rectangle blue " id="cancel" data-id="11">
                <p data-id="11" class="cancel">
                    <!-- <svg class="cancel" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#FFFFFF" data-id="11">
                        <path class="cancel" data-id="11" d="M360-240 120-480l240-240 56 56-144 144h568v80H272l144 144-56 56Z"/>
                    </svg> -->
                    ⌫
                </p>
            </div>
            <div class="rectangle purple" data-id="/" id="divide">
                <p data-id="/">/</p>
            </div>
            <div class="rectangle" data-id="7">
                <p data-id="7">7</p>
            </div>
            <div class="rectangle" data-id="8">
                <p data-id="8">8</p>
            </div>
            <div class="rectangle" id="nine" data-id="9">
                <p data-id="9">9</p>
            </div>
            <div class="rectangle purple" data-id="*" id="multiple">
                <p data-id="*"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#FFFFFF" data-id="*"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z" data-id="*"/></svg></p>
            </div>
            <div class="rectangle" data-id="4">
                <p data-id="4">4</p>
            </div>
            <div class="rectangle" data-id="5">
                <p data-id="5">5</p>
            </div>
            <div class="rectangle" data-id="6">
                <p data-id="6">6</p>
            </div>
            <div class="rectangle purple" data-id="-" id="subtract">
                <p data-id="-">-</p>
            </div>
            <div class="rectangle" data-id="1">
                <p data-id="1">1</p>
            </div>
            <div class="rectangle" data-id="2">
                <p data-id="2">2</p>
            </div>
            <div class="rectangle" data-id="3">
                <p data-id="3">3</p>
            </div>
            <div class="rectangle purple" data-id="+" id="add">
                <p data-id="+">+</p>
            </div>
            <div class="rectangle " data-id="00" id="left-radius" >
                <p data-id="00">00</p>
            </div>
            <div class="rectangle" data-id="0">
                <p data-id="0">0</p>
            </div>
            <div class="rectangle" data-id=".">
                <p data-id=".">.</p>
            </div>
            <div class="rectangle purple " id="equal">
                <p>=</p>
            </div>
        </div>
    </div>
    
    
</body>
</html>
